blueprint:
  name: Exterior Lights/Relays - Door Sensor (Manual Override)
  description: Turns on lights or relays when a door opens, but ONLY if they were off.
  domain: automation
  input:
    door_sensor:
      name: Door Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    light_target:
      name: Exterior Lights or Relays
      selector:
        entity:
          domain: 
            - light
            - switch
          multiple: true
    off_delay:
      name: Off Delay
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: single

trigger:
  platform: state
  entity_id: !input door_sensor
  from: "off"
  to: "on"

condition:
  # This native condition works perfectly with multiple entities 
  # without needing the "variables" key that caused your error.
  - condition: state
    entity_id: !input light_target
    state: "off"

action:
  - service: homeassistant.turn_on
    target:
      entity_id: !input light_target
  - wait_for_trigger:
      - platform: state
        entity_id: !input door_sensor
        from: "on"
        to: "off"
  - delay: !input off_delay
  - service: homeassistant.turn_off
    target:
      entity_id: !input light_target
