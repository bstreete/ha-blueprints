blueprint:
  name: Exterior Lights - Door Sensor (Manual Override + Sun Check)
  description: Turns on lights when a door opens, but ONLY if they were off AND it is dark outside.
  domain: automation
  input:
    door_sensor:
      name: Door Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    light_target:
      name: Exterior Lights or Relays
      selector:
        entity:
          domain: 
            - light
            - switch
          multiple: true
    sun_elevation:
      name: Max Sun Elevation
      description: Solar angle to stay below. 0 is the horizon; -6 is the end of civil twilight (getting very dark).
      default: 0
      selector:
        number:
          min: -90.0
          max: 90.0
          step: 0.5
          unit_of_measurement: degrees
          mode: slider
    off_delay:
      name: Off Delay
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: single

trigger:
  platform: state
  entity_id: !input door_sensor
  from: "off"
  to: "on"

condition:
  - condition: state
    entity_id: !input light_target
    state: "off"
  - condition: numeric_state
    entity_id: sun.sun
    attribute: elevation
    below: !input sun_elevation

action:
  - service: homeassistant.turn_on
    target:
      entity_id: !input light_target
  - wait_for_trigger:
      - platform: state
        entity_id: !input door_sensor
        from: "on"
        to: "off"
  - delay: !input off_delay
  - service: homeassistant.turn_off
    target:
      entity_id: !input light_target
