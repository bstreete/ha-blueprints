blueprint:
  name: Exterior Lights/Relays - Door Sensor (Manual Override)
  description: Turns on any target when a door opens, but ONLY if they were off.
  domain: automation
  input:
    door_sensor:
      name: Door Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    light_target:
      name: Lights, Switches, or Areas
      description: Choose any device, entity, or area.
      selector:
        target: {} # Removed domain filter to ensure devices appear
    off_delay:
      name: Off Delay
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: single

trigger:
  platform: state
  entity_id: !input door_sensor
  from: "off"
  to: "on"

condition:
  # This helper resolves targets (areas/devices) into a list of entity IDs
  # and ensures EVERY entity in your selection is currently "off"
  - condition: template
    value_template: >
      {% set entities = target_entities(target_val) %}
      {{ expand(entities) | selectattr('state', 'eq', 'on') | list | count == 0 }}
    variables:
      target_val: !input light_target

action:
  - service: homeassistant.turn_on
    target: !input light_target
  - wait_for_trigger:
      - platform: state
        entity_id: !input door_sensor
        from: "on"
        to: "off"
  - delay: !input off_delay
  - service: homeassistant.turn_off
    target: !input light_target
