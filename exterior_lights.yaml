blueprint:
  name: Exterior Lights - Door Sensor (Manual Override)
  description: Turns on lights when a door opens, but ONLY if they were off.
  domain: automation
  input:
    door_sensor:
      name: Door Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    light_target:
      name: Exterior Lights
      selector:
        target:
          entity:
            domain: light
    off_delay:
      name: Off Delay
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: single # Changed to single so it doesn't reset if the door is opened again

trigger:
  platform: state
  entity_id: !input door_sensor
  from: "off"
  to: "on"

condition:
  # This ensures the automation only proceeds if the light is currently OFF
  - condition: state
    entity_id: !input light_target
    state: "off"

action:
  - service: light.turn_on
    target: !input light_target
  - wait_for_trigger:
      - platform: state
        entity_id: !input door_sensor
        from: "on"
        to: "off"
  - delay: !input off_delay
  - service: light.turn_off
    target: !input light_target
