blueprint:
  name: Exterior Lights/Relays - Door Sensor (Manual Override)
  description: Turns on lights or relays when a door opens, but ONLY if they were off.
  domain: automation
  input:
    door_sensor:
      name: Door Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    light_target:
      name: Exterior Lights or Relays
      selector:
        target:
          entity:
            domain: 
              - light
              - switch
    off_delay:
      name: Off Delay
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: single

trigger:
  platform: state
  entity_id: !input door_sensor
  from: "off"
  to: "on"

condition:
  # This template expands your target (entities, areas, or devices) 
  # and only proceeds if ALL of them are currently OFF.
  - condition: template
    value_template: >
      {{ expand(entities) | selectattr('state', 'eq', 'on') | list | count == 0 }}
    variables:
      entities: !input light_target

action:
  # Use homeassistant.turn_on to support both lights and switches (relays)
  - service: homeassistant.turn_on
    target: !input light_target
  - wait_for_trigger:
      - platform: state
        entity_id: !input door_sensor
        from: "on"
        to: "off"
  - delay: !input off_delay
  - service: homeassistant.turn_off
    target: !input light_target
