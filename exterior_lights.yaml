blueprint:
  name: Door-Triggered Light (Sun Elevation) with Override
  description: Turns on light when doors open ONLY if the sun is below a specific angle. Manual toggle stays on.
  domain: automation
  input:
    door_sensors:
      name: Door Sensors
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    target_light:
      name: Light Relay
      selector:
        entity:
          domain: [light, switch]
    timer_helper:
      name: Timer Helper
      selector:
        entity:
          domain: timer
    run_duration:
      name: Auto-off Duration
      default: 300
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: seconds
    elevation_threshold:
      name: Sun Elevation Threshold
      description: Light only triggers if sun is below this angle. 0 is horizon, -6 is civil twilight.
      default: -1.0
      selector:
        number:
          min: -90.0
          max: 90.0
          mode: box
          unit_of_measurement: "°"

mode: restart

trigger:
  - platform: state
    entity_id: !input door_sensors
    to: "on"
    id: "door_opened"
  - platform: state
    entity_id: !input timer_helper
    to: "idle"
    id: "timer_done"
  - platform: state
    entity_id: !input target_light
    to: "on"
    id: "manual_on"

action:
  - choose:
      # SCENARIO 1: Door Opens (Check Sun Elevation)
      - conditions:
          - condition: trigger
            id: "door_opened"
          - condition: numeric_state
            entity_id: sun.sun
            attribute: elevation
            below: !input elevation_threshold
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: !input target_light
          - service: timer.start
            target:
              entity_id: !input timer_helper
            data:
              duration: !input run_duration

      # SCENARIO 2: Timer Finishes
      - conditions:
          - condition: trigger
            id: "timer_done"
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: !input target_light

      # SCENARIO 3: Manual Toggle
      - conditions:
          - condition: trigger
            id: "manual_on"
          - condition: state
            entity_id: !input timer_helper
            state: "idle"
        sequence:
          - service: timer.cancel
            target:
              entity_id: !input timer_helper
