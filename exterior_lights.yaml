blueprint:
  name: Door-Triggered Light with Manual Override
  description: Turns on a light for a set time when doors open. Manual toggle keeps it on.
  domain: automation
  input:
    door_sensors:
      name: Door Sensors
      description: Select one or more door sensors.
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    target_light:
      name: Light Relay
      description: The light or switch relay to control.
      selector:
        entity:
          domain: [light, switch]
    timer_helper:
      name: Timer Helper
      description: Select a Timer Helper (with 'Restore' enabled) for this specific light.
      selector:
        entity:
          domain: timer
    run_duration:
      name: Auto-off Duration
      description: How long the light stays on (e.g., 5 minutes).
      default: 300
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: seconds

mode: restart # Restarts timer if door is opened again

trigger:
  - platform: state
    entity_id: !input door_sensors
    to: "on"
    id: "door_opened"
  - platform: state
    entity_id: !input timer_helper
    to: "idle"
    id: "timer_done"
  - platform: state
    entity_id: !input target_light
    to: "on"
    id: "manual_on"

action:
  - choose:
      # SCENARIO 1: Door Opens
      - conditions:
          - condition: trigger
            id: "door_opened"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: !input target_light
          - service: timer.start
            target:
              entity_id: !input timer_helper
            data:
              duration: !input run_duration

      # SCENARIO 2: Timer Finishes
      - conditions:
          - condition: trigger
            id: "timer_done"
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: !input target_light

      # SCENARIO 3: Manual Toggle (Cancel Timer)
      - conditions:
          - condition: trigger
            id: "manual_on"
          - condition: state
            entity_id: !input timer_helper
            state: "idle" # If light turns on and timer ISN'T active, it's manual
        sequence:
          - service: timer.cancel
            target:
              entity_id: !input timer_helper
