blueprint:
  name: Exterior Lights/Relays - Door Sensor (Manual Override)
  description: Turns on lights or relays when a door opens, but ONLY if they were off.
  domain: automation
  input:
    door_sensor:
      name: Door Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    light_target:
      name: Exterior Lights or Relays
      selector:
        entity:
          domain: 
            - light
            - switch
          multiple: true
    off_delay:
      name: Off Delay
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: single

trigger:
  platform: state
  entity_id: !input door_sensor
  from: "off"
  to: "on"

condition:
  - condition: template
    value_template: >
      {% set entities = (input_entities) %}
      {{ expand(entities) | selectattr('state', 'eq', 'on') | list | count == 0 }}
    # We pass the input directly into the template variables
    variables:
      input_entities: !input light_target

# IF THE ERROR PERSISTS, USE THIS ALTERNATIVE CONDITION BLOCK INSTEAD:
# condition:
#   - condition: template
#     value_template: "{{ expand(light_target) | selectattr('state', 'eq', 'on') | list | count == 0 }}"

action:
  - service: homeassistant.turn_on
    target:
      entity_id: !input light_target
  - wait_for_trigger:
      - platform: state
        entity_id: !input door_sensor
        from: "on"
        to: "off"
  - delay: !input off_delay
  - service: homeassistant.turn_off
    target:
      entity_id: !input light_target
