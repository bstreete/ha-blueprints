blueprint:
  name: Exterior Lights/Relays - Door Sensor (Manual Override)
  description: Turns on lights or relays when a door opens, but ONLY if they were off.
  domain: automation
  input:
    door_sensor:
      name: Door Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    light_target:
      name: Exterior Lights or Relays
      selector:
        entity:
          domain: 
            - light
            - switch
          multiple: true
    off_delay:
      name: Off Delay
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

mode: single

trigger:
  platform: state
  entity_id: !input door_sensor
  from: "off"
  to: "on"

condition:
  # Checks if any of the selected entities are already "on"
  - condition: template
    value_template: >
      {{ expand(light_target_entities) | selectattr('state', 'eq', 'on') | list | count == 0 }}
    # We use the !input directly in the template instead of a variables key
    variables:
      light_target_entities: !input light_target

action:
  - service: homeassistant.turn_on
    target:
      entity_id: !input light_target
  - wait_for_trigger:
      - platform: state
        entity_id: !input door_sensor
        from: "on"
        to: "off"
  - delay: !input off_delay
  - service: homeassistant.turn_off
    target:
      entity_id: !input light_target
